services:
  coordinator:
    build: ./coordinator
    restart: unless-stopped
    env_file: .env
    volumes:
      - coordinator-data:/data
      - ./ssh:/ssh:ro
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --config /config/config.yml run
    volumes:
      - ./cloudflared:/config:ro
    depends_on:
      coordinator:
        condition: service_healthy

volumes:
  coordinator-data:
