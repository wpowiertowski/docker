<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LumiVault</title>
  <meta name="description" content="LumiVault is coming soon." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" />
  <style>
    :root {
      --bg: #160900;
      --fg: #fff5ee;
      --muted: #b08870;
      --accent: #ff7000;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Fira Mono", "IBM Plex Mono", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      background: radial-gradient(80% 80% at 30% 20%, #3d1400 0%, var(--bg) 65%);
      color: var(--fg);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      text-align: center;
      padding: 48px 24px;
      max-width: 720px;
    }
    h1 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      margin: 0 0 12px;
      letter-spacing: 0.5px;
    }
    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.2rem);
    }
    .logo { width: 120px; height: 120px; display: block; margin: 0 auto 32px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      color: var(--accent);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      text-decoration: none;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
  </style>
</head>
<body>
  <main>
    <img src="icon.png" class="logo" alt="LumiVault" />
    <h1>LumiVault</h1>
    <p>The offline-first photo vault for Mac — archive, protect, encrypt, and back up your library with zero subscriptions and zero cloud lock-in. Fully open source!</p>
    <div class="buttons">
      <a class="badge" href="https://github.com/wpowiertowski/lumivault.app" target="_blank" rel="noopener" style="text-transform: none">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        View on GitHub
      </a>
      <a class="badge" href="https://apps.apple.com/us/app/lumivault/id6761957453" target="_blank" rel="noopener" style="text-transform: none">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Download on the Mac App Store

    </div>
  </main>
</body>
</html>
