<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LumiVault — Coming Soon</title>
  <meta name="description" content="LumiVault is coming soon." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" />
  <style>
    :root {
      --bg: #160900;
      --fg: #fff5ee;
      --muted: #b08870;
      --accent: #ff7000;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Fira Mono", "IBM Plex Mono", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      background: radial-gradient(80% 80% at 30% 20%, #3d1400 0%, var(--bg) 65%);
      color: var(--fg);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      text-align: center;
      padding: 48px 24px;
      max-width: 720px;
    }
    h1 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      margin: 0 0 12px;
      letter-spacing: 0.5px;
    }
    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.2rem);
    }
    .logo { width: 120px; height: 120px; display: block; margin: 0 auto 32px; }
    .badge {
      display: inline-block;
      border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      color: var(--accent);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <img src="icon.png" class="logo" alt="LumiVault" />
    <h1>LumiVault</h1>
    <p>The offline-first photo vault for Mac — archive, protect, encrypt, and back up your library with zero subscriptions and zero cloud lock-in.</p>
  </main>
</body>
</html>
